<p calss="point bold">요청 이유</p>
	<p calss="MaT_10">오피스텔은 집으로 사용할수 있고 상가로도 사용가능하여 임대차 등록사실 확인서라고 해서 서류 발급을 하면 세입자나 회사든 사업자에 대한 전입세대 열람원이라고 보면 되는데 이 서류를 소유자만 발급가능하여 보통 영업점에서는 대출 실행 하루전날에 
	임대차 조사원이 발급후 조회하여 서류를 미리 작성해주셔야 조회가 가능함</p>
