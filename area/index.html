<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수도권 담보회수율 조회</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body { font-family: sans-serif; }
        .sm_select { padding: 10px; background: #f8f9fa; }
        .sm_select select { width:100%; padding: 15px; font-size: 1.5em; border-radius: 8px; border: 1px solid #ddd; }
        
        .tab-contents { padding: 20px; }
        h3 { font-size: 1.8em; margin-bottom: 15px; color: #333; border-bottom: 2px solid #000; padding-bottom: 10px; }
        
        .list li { list-style: none; font-size: 1.4em; padding: 15px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .list li .right { font-weight: bold; color: #007bff; }
        
        .point { color: red; padding: 20px; font-size: 1.2em; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="sm_select">
    <select id="regionSelect">
        </select>
</div>

<div id="contentArea" class="tab-contents">
    <h3 id="displayTitle">지역을 선택하세요</h3>
    <div class="list">
        <ul id="displayList">
        </ul>
    </div>
</div>

<div class="point">기준일: 2025.06 이후</div>

<script src="data.js"></script>

<script>
$(document).ready(function() {
    const $select = $('#regionSelect');
    const $title = $('#displayTitle');
    const $list = $('#displayList');

    // 1. 셀렉트 박스 초기화 (data.js의 키값 기준)
    Object.keys(collateralData).forEach(region => {
        $select.append(`<option value="${region}">${region}</option>`);
    });

    // 2. 화면 업데이트 함수
    function updateDisplay(region) {
        const data = collateralData[region];
        $title.text(`${region} 담보 회수율`);
        $list.empty();

        for (const [name, value] of Object.entries(data)) {
            $list.append(`
                <li>
                    <span class="left">${name}</span>
                    <span class="right">${value}</span>
                </li>
            `);
        }
    }

    // 3. 변경 이벤트
    $select.on('change', function() {
        updateDisplay($(this).val());
    });

    // 4. 초기 실행 (첫 번째 지역 표시)
    updateDisplay(Object.keys(collateralData)[0]);
});
</script>

</body>
</html>
