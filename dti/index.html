<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/kdk0781/kb/main/ico/dticalc.png">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/kdk0781/kb/main/ico/dticalc.png">
    <link rel="icon" href="https://raw.githubusercontent.com/kdk0781/kb/main/ico/dticalc.png">
    <link rel="manifest" href="dti.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DTI계산기">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>금융 대출 계산기 (DTI)</title>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; }

        /* 바운스 효과를 위한 핵심 설정 */
        html {
            height: 100%;
            overflow: hidden; /* 시스템 기본 스크롤을 막고 body에서 제어 */
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0;
            height: 100%;
            overflow-y: scroll; /* 스크롤 강제 활성화 */
            -webkit-overflow-scrolling: touch; /* iOS 바운스/가속 스크롤 활성화 */
            display: flex;
            justify-content: center;
        }

        /* 당겨서 새로고침 가이드 문구 */
        .pull-to-refresh-guide {
            position: fixed;
            top: -50px; /* 평소엔 숨김 */
            left: 0; width: 100%; height: 50px;
            display: flex; justify-content: center; align-items: center;
            color: #888; font-size: 0.8rem;
            z-index: -1;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
            margin: 40px 20px; /* 상하 여백을 주어 바운스 공간 확보 */
            position: relative;
            align-self: flex-start;
        }
        
        .refresh-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #ddd; padding: 10px; z-index: 10; }

        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 1.5rem; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: #999; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 5px; }
        .input-box { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 8px; padding: 0 12px; background: white; }
        .input-box input, .input-box select { flex: 1; border: none; padding: 12px 0; font-size: 1rem; outline: none; background: transparent; text-align: right; }
        .unit { font-size: 0.9rem; color: #888; white-space: nowrap; margin-left: 5px; }
        button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        #result-area { margin-top: 25px; padding: 20px; background: #f1f9ff; border-radius: 10px; display: none; border: 1px solid #d6e9f8; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .result-val { font-weight: bold; color: #e74c3c; }

        /* 커스텀 모달 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        .modal-button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="pull-to-refresh-guide" id="refreshGuide">↓ 아래로 당겨서 새로고침</div>

    <div class="container">
        <button class="refresh-btn" onclick="location.reload();">↺</button>
        
        <h2>DTI 금융 계산기</h2>
        
        <div class="tabs">
            <div class="tab active" id="tab-jeonse" onclick="switchTab('jeonse')">전세자금대출</div>
            <div class="tab" id="tab-mortgage" onclick="switchTab('mortgage')">주택담보대출</div>
        </div>

        <div id="method_group" class="input-group" style="display: none;">
            <label for="repay_method">상환 방법</label>
            <div class="input-box">
                <select id="repay_method" onchange="toggleGrace()">
                    <option value="both">원리금균등상환</option>
                    <option value="principal">원금균등상환</option>
                    <option value="expiry">만기일시상환</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label for="loan_money">대출 신청 금액</label>
            <div class="input-box">
                <input type="text" id="loan_money" inputmode="numeric" pattern="\d*" oninput="formatNumber(this)" placeholder="0">
                <span class="unit">원</span>
            </div>
        </div>

        <div class="input-group">
            <label for="loan_rate">대출 금리</label>
            <div class="input-box">
                <input type="number" step="0.01" id="loan_rate" inputmode="decimal" placeholder="0.00">
                <span class="unit">%</span>
            </div>
        </div>

        <div class="input-group">
            <label for="loan_period">대출 기간</label>
            <div class="input-box">
                <input type="text" id="loan_period" inputmode="numeric" pattern="\d*" oninput="formatNumber(this)" placeholder="0">
                <span class="unit">개월</span>
            </div>
        </div>

        <div id="grace_group" class="input-group" style="display: none;">
            <label for="grace_period">거치 기간</label>
            <div class="input-box">
                <input type="text" id="grace_period" inputmode="numeric" pattern="\d*" oninput="formatNumber(this)" value="0">
                <span class="unit">개월</span>
            </div>
        </div>

        <div class="input-group">
            <label for="income_money">연간 총소득</label>
            <div class="input-box">
                <input type="text" id="income_money" inputmode="numeric" pattern="\d*" oninput="formatNumber(this)" placeholder="0">
                <span class="unit">원</span>
            </div>
        </div>

        <div class="input-group">
            <label for="debt_money">기존 부채 총액</label>
            <div class="input-box">
                <input type="text" id="debt_money" inputmode="numeric" pattern="\d*" oninput="formatNumber(this)" value="0">
                <span class="unit">원</span>
            </div>
        </div>

        <div class="input-group">
            <label for="pre_rate">부채 추정 금리</label>
            <div class="input-box">
                <input type="number" step="0.1" id="pre_rate" inputmode="decimal" placeholder="6.2">
                <span class="unit">%</span>
            </div>
        </div>

        <button onclick="calculate()">계산하기</button>

        <div id="result-area">
            <div class="result-row">
                <span id="payment_label">첫 달 이자 상환액:</span>
                <span id="monthly_payment" class="result-val">0원</span>
            </div>
            <div class="result-row" style="border-top: 1px solid #ddd; margin-top:10px; padding-top:10px;">
                <span>최종 DTI 지수:</span>
                <span id="result" class="result-val" style="font-size: 1.3rem;">0%</span>
            </div>
            <div id="method_desc" class="method-info"></div>
        </div>
    </div>

    <div class="modal-overlay" id="customModal">
        <div class="modal-content">
            <div id="modalMessage">메시지</div>
            <button class="modal-button" onclick="closeModal()">확인</button>
        </div>
    </div>

<script>
    let touchStartY = 0;
    const guide = document.getElementById('refreshGuide');

    // 터치 시작 시 스크롤 위치 저장
    window.addEventListener('touchstart', e => { 
        touchStartY = e.touches[0].pageY; 
    }, {passive: true});

    // 터치 이동 시 상단 가이드 노출 제어
    window.addEventListener('touchmove', e => {
        const touchY = e.touches[0].pageY;
        const diff = touchY - touchStartY;
        
        if (window.scrollY <= 0 && diff > 50) {
            guide.style.top = (Math.min(diff / 2, 50) - 50) + "px";
        }
    }, {passive: true});

    // 터치 종료 시 새로고침 실행
    window.addEventListener('touchend', e => {
        const diff = e.changedTouches[0].pageY - touchStartY;
        guide.style.top = "-50px"; // 다시 숨김
        
        if (window.scrollY <= 0 && diff > 180) { // 180px 이상 당기면 새로고침
            location.reload();
        }
    });

    let currentMode = 'jeonse';
    function openModal(msg) { document.getElementById('modalMessage').innerText = msg; document.getElementById('customModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('tab-jeonse').className = (mode === 'jeonse' ? 'tab active' : 'tab');
        document.getElementById('tab-mortgage').className = (mode === 'mortgage' ? 'tab active' : 'tab');
        document.getElementById('method_group').style.display = (mode === 'mortgage' ? 'block' : 'none');
        document.getElementById('grace_group').style.display = (mode === 'mortgage' ? 'block' : 'none');
        document.getElementById('payment_label').innerText = (mode === 'mortgage' ? "첫 달 상환액:" : "첫 달 이자 상환액:");
        document.getElementById('result-area').style.display = 'none';
    }

    function toggleGrace() {
        const method = document.getElementById('repay_method').value;
        document.getElementById('grace_group').style.display = (method === 'expiry' ? 'none' : 'block');
    }

    function formatNumber(input) {
        let value = input.value.replace(/[^0-9]/g, "");
        input.value = value ? parseInt(value).toLocaleString() : "";
    }

    function unformat(str) { return parseFloat(str.replace(/,/g, "")) || 0; }

    function calculate() {
        const P = unformat(document.getElementById('loan_money').value);
        const annualRate = parseFloat(document.getElementById('loan_rate').value) / 100;
        const n = unformat(document.getElementById('loan_period').value);
        const g = currentMode === 'mortgage' ? unformat(document.getElementById('grace_period').value) : 0;
        const income = unformat(document.getElementById('income_money').value);
        const totalDebt = unformat(document.getElementById('debt_money').value);
        const preRate = (document.getElementById('pre_rate').value === "" ? 6.2 : parseFloat(document.getElementById('pre_rate').value)) / 100;
        const method = document.getElementById('repay_method').value;

        if (!P || isNaN(annualRate) || !n || !income) { openModal("모든 정보를 입력해 주세요."); return; }

        const r = annualRate / 12;
        let firstMonthPay = 0, annualNewRepay = 0, desc = "";

        if (currentMode === 'mortgage') {
            if (method === 'both') {
                const repayMonths = n - g;
                const monthly = (P * r * Math.pow(1 + r, repayMonths)) / (Math.pow(1 + r, repayMonths) - 1);
                firstMonthPay = g > 0 ? (P * r) : monthly;
                annualNewRepay = monthly * 12;
                desc = "원리금균등상환 방식입니다.";
            } else if (method === 'principal') {
                const repayMonths = n - g;
                const monthlyPrincipal = P / repayMonths;
                firstMonthPay = g > 0 ? (P * r) : (monthlyPrincipal + (P * r));
                annualNewRepay = (monthlyPrincipal * 12) + (P * annualRate);
                desc = "원금균등상환 방식입니다.";
            } else {
                firstMonthPay = P * r;
                annualNewRepay = P * annualRate;
                desc = "만기일시상환 방식입니다.";
            }
        } else {
            firstMonthPay = P * r; annualNewRepay = P * annualRate;
            desc = "전세자금대출(이자 납부 기준)입니다.";
        }

        const dti = ((annualNewRepay + (totalDebt * preRate)) / income) * 100;
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('monthly_payment').innerText = Math.round(firstMonthPay).toLocaleString() + " 원";
        document.getElementById('result').innerText = dti.toFixed(2) + " %";
        document.getElementById('method_desc').innerText = "* " + desc;
    }
</script>

</body>
</html>
