<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KB 가계부채 관리 강화방안 FAQ</title>

  <!-- 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- 스타일시트 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══════════════════════════════
       헤더
       ══════════════════════════════ -->
  <header>
    <div class="header-inner">
      <div class="logo-mark">KB FAQ</div>
      <div class="header-title">가계부채 관리 강화방안</div>
      <div class="header-meta">2025.10.23 기준</div>
    </div>
  </header>

  <!-- ══════════════════════════════
       검색 + 카테고리 필터
       ══════════════════════════════ -->
  <div class="search-wrap">
    <div class="search-inner">

      <!-- 검색창 -->
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          class="search-input"
          type="text"
          id="searchInput"
          placeholder="질문 또는 키워드 검색..."
          autocomplete="off"
        >
        <button class="search-clear" id="searchClear" aria-label="검색어 지우기">✕</button>
      </div>

      <!-- 카테고리 Pills (JS로 생성) -->
      <div class="cat-bar" id="catBar"></div>

    </div>
  </div>

  <!-- ══════════════════════════════
       FAQ 목록 (JS로 렌더링)
       ══════════════════════════════ -->
  <main id="mainContent"></main>

  <!-- ══════════════════════════════
       FAB — 항목 추가 버튼
       ══════════════════════════════ -->
  <button class="fab" id="fabBtn" title="FAQ 항목 추가" aria-label="FAQ 항목 추가">＋</button>

  <!-- ══════════════════════════════
       모달 — FAQ 추가 폼
       ══════════════════════════════ -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="FAQ 항목 추가">
    <div class="modal">

      <div class="modal-title">
        <span>FAQ 항목 추가</span>
        <button class="modal-close" id="modalClose" aria-label="닫기">✕</button>
      </div>

      <!-- 분류 -->
      <div class="form-group">
        <label class="form-label" for="formCat">분류</label>
        <select class="form-select" id="formCat">
          <option value="구입자금">주택담보대출 (구입자금)</option>
          <option value="생활안정자금">주택담보대출 (생활안정자금)</option>
          <option value="임차보증금">주택담보대출 (임차보증금 반환)</option>
          <option value="신용대출">신용대출</option>
          <option value="공통">공통</option>
        </select>
      </div>

      <!-- 질문 -->
      <div class="form-group">
        <label class="form-label" for="formQ">질문</label>
        <input class="form-input" type="text" id="formQ" placeholder="질문을 입력하세요">
      </div>

      <!-- 답변 -->
      <div class="form-group">
        <label class="form-label" for="formA">답변</label>
        <textarea class="form-textarea" id="formA" placeholder="답변을 입력하세요"></textarea>
      </div>

      <!-- 태그 -->
      <div class="form-group">
        <label class="form-label">태그</label>
        <div class="form-check-group">
          <label class="form-check-label">
            <input type="checkbox" id="tagNew">
            <span>NEW</span>
          </label>
          <label class="form-check-label">
            <input type="checkbox" id="tagCommon">
            <span>공통</span>
          </label>
        </div>
      </div>

      <!-- 버튼 -->
      <div class="form-actions">
        <button class="btn btn-cancel" id="btnCancel">취소</button>
        <button class="btn btn-primary" id="btnSubmit">추가</button>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════
       스크립트 — data.js 먼저 로드 후 app.js
       ══════════════════════════════ -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
