<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSR 정밀 진단기 (반응형)</title>
    <style>
        :root { --kb-yellow: #FFCC00; --kb-dark: #262626; --safe: #2ecc71; --danger: #e74c3c; --blue: #3498db; --gray: #f8f9fa; --border: #ececec; }
        body { font-family: 'Pretendard', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px 15px; color: #333; -webkit-tap-highlight-color: transparent; }
        
        .container { max-width: 850px; margin: auto; background: #fff; padding: clamp(20px, 5vw, 40px); border-radius: 28px; box-shadow: 0 15px 50px rgba(0,0,0,0.06); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { font-size: 1.6rem; font-weight: 800; border-bottom: 6px solid var(--kb-yellow); display: inline-block; padding-bottom: 4px; margin: 0; }
        
        .section-title { font-size: 1.1rem; font-weight: 700; margin: 30px 0 12px; display: flex; align-items: center; color: var(--kb-dark); }
        .section-title::before { content: ""; width: 5px; height: 18px; background: var(--kb-yellow); margin-right: 10px; border-radius: 3px; }
        
        .input-card { background: var(--gray); padding: 20px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #eee; position: relative; }
        
        /* [중요] 반응형 그리드: 태블릿(768px) 이하에서는 한 줄씩 표시 */
        .grid-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        @media (max-width: 768px) {
            .grid-row { grid-template-columns: 1fr; }
            .grid-row div { margin-bottom: 4px; }
        }
        
        label { display: block; font-size: 11px; font-weight: 700; color: #777; margin-bottom: 6px; }
        input, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #fff; }
        input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1); }

        .btn-calc { width: 100%; padding: 20px; background: var(--kb-dark); color: var(--kb-yellow); border: none; border-radius: 16px; font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }

        /* 결과 영역 시각화 */
        .result-box { margin-top: 35px; display: none; padding: 25px; border-radius: 24px; background: #fffdf2; border: 1px solid #ffe58f; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .dsr-main-val { font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 900; text-align: center; margin: 5px 0; }
        .dsr-progress-container { width: 100%; height: 14px; background: #e9ecef; border-radius: 10px; margin: 25px 0 45px; position: relative; }
        .dsr-progress-bar { height: 100%; border-radius: 10px; width: 0%; transition: width 1s ease-in-out; }
        .limit-marker { position: absolute; left: 40%; top: -5px; height: 24px; width: 2px; background: var(--danger); z-index: 2; }
        .limit-label { position: absolute; left: 40%; top: 28px; transform: translateX(-50%); font-size: 10px; color: var(--danger); font-weight: 800; white-space: nowrap; }

        .max-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .max-item { background: var(--kb-dark); color: #fff; padding: 35px 20px 20px; border-radius: 20px; text-align: center; position: relative; border: 2.5px solid transparent; }
        .max-item.recommended { border-color: var(--safe); background: #1a1a1a; }
        .rec-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--safe); color: #fff; font-size: 11px; padding: 4px 14px; border-radius: 20px; font-weight: 800; }
        .max-val { font-size: 1.8rem; font-weight: 900; color: var(--kb-yellow); }

        .comparison-table { width: 100%; margin: 20px 0; border-collapse: collapse; font-size: 13px; border-radius: 12px; overflow: hidden; }
        .comparison-table th { background: #f8f9fa; padding: 12px; border: 1px solid var(--border); }
        .comparison-table td { padding: 14px 8px; text-align: center; background: #fff; border: 1px solid var(--border); }

        .limit-card { background: #fff; border: 3.5px solid var(--blue); padding: 25px; border-radius: 20px; text-align: center; margin-top: 25px; }
        .limit-val { font-size: 2.2rem; font-weight: 900; color: var(--blue); }
        .btn-remove { position: absolute; top: -10px; right: -10px; width: 32px; height: 32px; background: #fff; border: 1px solid #ddd; border-radius: 50%; color: #999; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>📊 DSR 정밀 진단기</h2></div>

    <div class="section-title">1. 연소득 정보</div>
    <div class="input-card">
        <label>연간 세전 소득 (원)</label>
        <input type="text" id="income" inputmode="numeric" onkeyup="formatComma(this)" placeholder="예: 60,000,000">
    </div>

    <div class="section-title">2. 부채 상세 설정</div>
    <div id="loanList"></div>
    <button style="background: #fff; border: 2px dashed #ddd; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 700; margin-bottom: 25px; color: #777;" onclick="addLoan()">+ 부채 항목 추가</button>

    <button class="btn-calc" onclick="calculateTotalDSR()">분석 및 고도화 한도 확인</button>

    <div id="resultArea" class="result-box">
        <div style="text-align: center;">
            <label style="color:#666; font-size:14px; font-weight:600;">나의 종합 DSR</label>
            <div id="dsrVal" class="dsr-main-val">0%</div>
            <div class="dsr-progress-container">
                <div id="dsrBar" class="dsr-progress-bar"></div>
                <div class="limit-marker"></div>
                <div class="limit-label">정부 규제선 (40%)</div>
            </div>
            <p id="dsrMsg" style="font-weight: 800; font-size: 1.1rem; margin-bottom: 30px;"></p>
        </div>

        <div class="section-title">한도 증액 솔루션</div>
        <div class="max-grid">
            <div class="max-item recommended">
                <div class="rec-badge">DSR 산정 유리 (한도 증액)</div>
                <label>원금균등 상환 한도</label>
                <div id="absMaxPrin" class="max-val">0원</div>
            </div>
            <div class="max-item">
                <label>원리금균등 상환 한도</label>
                <div id="absMaxLevel" class="max-val">0원</div>
            </div>
        </div>

        <table class="comparison-table">
            <thead>
                <tr><th>항목</th><th>원금균등 (추천)</th><th>원리금균등</th></tr>
            </thead>
            <tbody>
                <tr><td>대출 가능액</td><td style="color:var(--safe); font-weight:bold;">약 7~10% 상향</td><td>표준 한도</td></tr>
                <tr><td>전체 이자</td><td style="color:var(--safe); font-weight:bold;">최저 수준</td><td>보통</td></tr>
                <tr><td>월 납입액</td><td>초기 높음/점점 하락</td><td style="color:var(--blue); font-weight:bold;">고정적</td></tr>
            </tbody>
        </table>

        <div class="limit-card">
            <label style="color:var(--blue); font-weight:700;">추가 대출 가능 예상액</label>
            <div id="remainingLimit" class="limit-val">0원</div>
            <p id="limitDetail" style="font-size: 11px; color:#888; margin-top: 8px;">* 원금균등 및 주담대 30년 기준 계산</p>
        </div>
    </div>
</div>

<script>
function formatComma(obj) {
    let val = obj.value.replace(/[^0-9]/g, ""); 
    if (val.length > 0) obj.value = Number(val).toLocaleString();
    else obj.value = "";
}

function getNum(val) { return Number(val.toString().replace(/,/g, "")) || 0; }

let loanCount = 0;
function addLoan() {
    loanCount++;
    const html = `
        <div class="input-card" id="loan_${loanCount}">
            <button class="btn-remove" onclick="document.getElementById('loan_${loanCount}').remove()">×</button>
            <div class="grid-row">
                <div>
                    <label>대출 종류</label>
                    <select class="l-category" onchange="applyPolicy(${loanCount})">
                        <option value="mortgage_prin">주택담보 (원금균등)</option>
                        <option value="mortgage_level">주택담보 (원리금균등)</option>
                        <option value="jeonse">전세자금 (이자만)</option>
                        <option value="credit">신용대출 (5년)</option>
                        <option value="card_loan">카드론 (3년)</option>
                    </select>
                </div>
                <div><label>원금/잔액 (원)</label><input type="text" class="l-p" inputmode="numeric" onkeyup="formatComma(this)" placeholder="0"></div>
                <div><label>금리 (%)</label><input type="text" class="l-r" inputmode="decimal" placeholder="4.5"></div>
                <div><label>기간 (개월)</label><input type="text" class="l-m" inputmode="numeric" value="360"></div>
            </div>
        </div>`;
    document.getElementById('loanList').insertAdjacentHTML('beforeend', html);
}

function applyPolicy(id) {
    const card = document.getElementById(`loan_${id}`);
    const cat = card.querySelector('.l-category').value;
    const m = card.querySelector('.l-m');
    const r = card.querySelector('.l-r');
    if(cat === 'credit') { m.value = "60"; r.placeholder = "6.0"; }
    else if(cat === 'card_loan') { m.value = "36"; r.placeholder = "14.0"; }
    else if(cat === 'jeonse') { m.value = "1"; r.placeholder = "4.2"; }
    else { m.value = "360"; r.placeholder = "4.5"; }
}

function calculateTotalDSR() {
    const income = getNum(document.getElementById('income').value);
    if (income <= 0) { alert("연소득을 입력해주세요."); return; }

    let totalAnnualPay = 0;
    let baseRate = 0;
    let firstMonths = 360;
    const items = document.querySelectorAll('[id^="loan_"]');
    
    if(items.length === 0) { alert("부채 항목을 추가해주세요."); return; }

    items.forEach((item, index) => {
        const cat = item.querySelector('.l-category').value;
        const P = getNum(item.querySelector('.l-p').value);
        const R_raw = item.querySelector('.l-r').value || item.querySelector('.l-r').placeholder;
        const n = getNum(item.querySelector('.l-m').value);
        
        if (P > 0) {
            const R = Number(R_raw) / 100;
            const r = R / 12;
            if (index === 0) { baseRate = Number(R_raw); firstMonths = n; }

            if (cat === 'jeonse') {
                totalAnnualPay += P * R;
            } else if (cat === 'mortgage_prin') {
                // 원금균등 한도 우위 로직 (평균 원리금 산정 방식 적용)
                totalAnnualPay += (P/n + (P*r * 0.72)) * 12; 
            } else {
                totalAnnualPay += ((P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1))*12;
            }
        }
    });

    const dsr = (totalAnnualPay / income) * 100;
    const dsrLimit = income * 0.4;
    
    // UI 업데이트
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('dsrVal').innerText = dsr.toFixed(2) + "%";
    document.getElementById('dsrVal').style.color = dsr > 40 ? "var(--danger)" : "var(--safe)";
    
    const bar = document.getElementById('dsrBar');
    bar.style.width = Math.min(dsr, 100) + "%";
    bar.style.background = dsr > 40 ? "var(--danger)" : "var(--safe)";

    const r_b = (baseRate / 100) / 12;
    const n_b = firstMonths;
    
    // 원금균등 방식이 DSR 산정 시 이자 부분이 체감되는 특성을 반영하여 한도를 약 8% 상향 계산
    const maxP = (dsrLimit / 12) / (1/n_b + (r_b * 0.68)); 
    const maxL = ((dsrLimit / 12) * (Math.pow(1+r_b, n_b)-1)) / (r_b * Math.pow(1+r_b, n_b));

    document.getElementById('absMaxPrin').innerText = (Math.floor(maxP/10000)*10000).toLocaleString() + " 원";
    document.getElementById('absMaxLevel').innerText = (Math.floor(maxL/10000)*10000).toLocaleString() + " 원";

    const remBudget = dsrLimit - totalAnnualPay;
    const addLim = remBudget > 0 ? (remBudget / 12) / (1/n_b + (r_b * 0.68)) : 0;
    document.getElementById('remainingLimit').innerText = (Math.floor(addLim/10000)*10000).toLocaleString() + " 원";
    document.getElementById('dsrMsg').innerText = dsr > 40 ? "🚨 대출 한도가 초과되었습니다." : "✅ 추가 대출이 가능한 여유 상태입니다.";

    window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 20, behavior: 'smooth' });
}
addLoan();
</script>
</body>
</html>
