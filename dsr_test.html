<style>
    /* 추가/수정된 스타일 */
    .comparison-table {
        width: 100%;
        margin-top: 20px;
        border-spacing: 0;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #eee;
    }
    .comparison-table th {
        background: #f1f3f5;
        padding: 12px;
        font-size: 13px;
        color: #495057;
    }
    .comparison-table td {
        padding: 15px 10px;
        text-align: center;
        background: #fff;
        border-top: 1px solid #eee;
        font-size: 13px;
    }
    .highlight-green { color: #2ecc71; font-weight: 700; }
    .highlight-blue { color: #3498db; font-weight: 700; }
    
    /* DSR 게이지 바 추가 */
    .dsr-progress-container {
        width: 100%;
        height: 12px;
        background: #eee;
        border-radius: 10px;
        margin: 20px 0;
        position: relative;
    }
    .dsr-progress-bar {
        height: 100%;
        border-radius: 10px;
        transition: width 0.5s ease-in-out;
    }
    .limit-marker {
        position: absolute;
        left: 40%;
        top: -5px;
        height: 22px;
        width: 2px;
        background: #e74c3c;
    }
</style>

<div id="resultArea" class="result-box">
    <div style="text-align: center; margin-bottom: 25px;">
        <label style="color:#666; font-size:14px; font-weight:600;">나의 DSR 상태</label>
        <div id="dsrVal" class="dsr-main-val">0%</div>
        
        <div class="dsr-progress-container">
            <div id="dsrBar" class="dsr-progress-bar" style="width: 0%;"></div>
            <div class="limit-marker"></div>
            <span style="position:absolute; left:40%; top:25px; font-size:10px; color:#e74c3c; font-weight:bold;">규제한도 40%</span>
        </div>
        
        <p id="dsrMsg" style="font-weight: 800; margin-top: 30px; font-size: 1.1rem;"></p>
    </div>

    <div class="section-title">상환 방식별 초정밀 비교</div>
    <table class="comparison-table">
        <thead>
            <tr>
                <th>구분</th>
                <th>원금균등 (권장)</th>
                <th>원리금균등</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>대출 한도</strong></td>
                <td class="highlight-green">최대 약 10% 증액</td>
                <td>표준 한도</td>
            </tr>
            <tr>
                <td><strong>총 이자비용</strong></td>
                <td class="highlight-green">최소화 (가장 저렴)</td>
                <td>보통</td>
            </tr>
            <tr>
                <td><strong>초기 월부담</strong></td>
                <td>다소 높음</td>
                <td class="highlight-blue">일정하고 낮음</td>
            </tr>
        </tbody>
    </table>

    </div>

<script>
// calculateTotalDSR 함수 내 마지막 부분에 게이지 업데이트 로직 추가
function updateVisuals(dsr) {
    const bar = document.getElementById('dsrBar');
    const clampedDsr = Math.min(dsr, 100);
    bar.style.width = clampedDsr + '%';
    
    if (dsr > 40) {
        bar.style.background = 'linear-gradient(90deg, #2ecc71 40%, #e74c3c 40%)';
    } else {
        bar.style.background = '#2ecc71';
    }
}
// calculateTotalDSR 함수 내 dsr 계산 후 updateVisuals(dsr); 호출 추가
</script>
