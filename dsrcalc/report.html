<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>DSR 진단 리포트</title>
  <link rel="icon" type="image/png" href="../ico/favicon-light.png">
  <link rel="stylesheet" href="common.css" media="all">
  <style>
    /* ── 리포트 전용 스타일 ──────────────────────────────────────────────── */
    body { background: var(--bg-page); }

    .rp-wrap {
      max-width: 560px; margin: 0 auto; padding: 20px 16px 60px;
    }

    /* ── 헤더 ─────────────────────────────────────────────────────────────── */
    .rp-header {
      background: linear-gradient(135deg, var(--kb-navy, #12203A), #1e3560);
      border-radius: var(--radius-xl, 18px); padding: 28px 24px 22px;
      margin-bottom: 16px; position: relative; overflow: hidden;
    }
    .rp-header::after {
      content: ''; position: absolute; right: -20px; top: -20px;
      width: 120px; height: 120px;
      background: rgba(255,184,0,.12); border-radius: 50%;
    }
    .rp-logo { font-size: 11px; font-weight: 700; color: var(--kb-yellow, #FFB800); letter-spacing: .08em; margin-bottom: 6px; }
    .rp-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 4px; }
    .rp-meta  { font-size: 11.5px; color: rgba(255,255,255,.55); }
    .rp-expiry-badge {
      display: inline-block; margin-top: 10px;
      font-size: 11px; font-weight: 600; color: var(--kb-yellow, #FFB800);
      background: rgba(255,184,0,.15); border: 1px solid rgba(255,184,0,.3);
      border-radius: 6px; padding: 3px 9px;
    }

    /* ── 공통 카드 ────────────────────────────────────────────────────────── */
    .rp-card {
      background: var(--bg-surface, #fff);
      border: 1.5px solid var(--border, #e8eaf0);
      border-radius: var(--radius-xl, 18px);
      padding: 20px 18px; margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      position: relative; overflow: hidden;
    }
    .rp-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--kb-yellow, #FFB800), var(--kb-yellow-deep, #e5a800));
    }
    .rp-card-title {
      font-size: 12px; font-weight: 700; color: var(--text-muted, #8a8fa8);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px;
    }

    /* ── DSR 종합 ─────────────────────────────────────────────────────────── */
    .dsr-big { font-size: 48px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
    .dsr-label { font-size: 12.5px; color: var(--text-secondary, #555); margin-bottom: 14px; }
    .dsr-bar-bg {
      height: 10px; background: var(--bg-surface-2, #f0f2f7);
      border-radius: 99px; overflow: hidden; margin-bottom: 6px;
    }
    .dsr-bar-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
    .dsr-limit-row {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text-muted, #8a8fa8);
    }

    /* ── 요약 그리드 ──────────────────────────────────────────────────────── */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .summary-item { background: var(--bg-surface-2, #f7f8fa); border-radius: 12px; padding: 12px 14px; }
    .summary-item-label { font-size: 11px; color: var(--text-muted, #8a8fa8); margin-bottom: 4px; }
    .summary-item-value { font-size: 15px; font-weight: 800; color: var(--text-primary, #111); word-break: break-all; }

    /* ── 진단 문구 ────────────────────────────────────────────────────────── */
    .rec-box {
      background: var(--bg-surface-2, #f7f8fa); border-radius: 12px;
      padding: 14px 16px; font-size: 13px; line-height: 1.75;
      color: var(--text-primary, #111);
    }

    /* ── 개별 부채 DSR 기여도 ─────────────────────────────────────────────── */
    .loan-contrib-item { margin-bottom: 14px; }
    .loan-contrib-item:last-child { margin-bottom: 0; }
    .loan-contrib-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 5px;
    }
    .loan-contrib-name { font-size: 13px; font-weight: 700; color: var(--text-primary, #111); }
    .loan-contrib-meta { font-size: 11px; color: var(--text-muted, #8a8fa8); }
    .loan-contrib-pct  { font-size: 14px; font-weight: 900; }

    .contrib-bar-bg {
      height: 8px; background: var(--bg-surface-2, #f0f2f7);
      border-radius: 99px; overflow: hidden; margin-bottom: 3px;
    }
    .contrib-bar-fill { height: 100%; border-radius: 99px; }

    .loan-contrib-detail {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text-muted, #8a8fa8);
    }

    /* ── 역행 산출 / 상환 목표 ────────────────────────────────────────────── */
    .reverse-card { border-color: var(--danger, #e53e3e) !important; }
    .reverse-card::before { background: linear-gradient(90deg, var(--danger, #e53e3e), #ff6b6b) !important; }
    .reverse-card .rp-card-title { color: var(--danger, #e53e3e) !important; }

    .reverse-solution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .reverse-solution-item {
      background: var(--bg-surface-2, #f7f8fa); border-radius: 12px;
      padding: 14px; text-align: center;
    }
    .reverse-solution-item.highlight {
      background: rgba(255,184,0,.12); border: 1.5px solid rgba(255,184,0,.4);
    }
    .rs-label { font-size: 11px; color: var(--text-muted, #8a8fa8); margin-bottom: 6px; }
    .rs-value { font-size: 16px; font-weight: 900; color: var(--text-primary, #111); word-break: break-all; }
    .rs-value.accent { color: var(--kb-navy, #12203A); }

    .reverse-tip {
      font-size: 12px; color: var(--text-secondary, #555); line-height: 1.7;
      background: var(--bg-surface-2, #f7f8fa); border-radius: 10px; padding: 12px 14px;
    }

    /* 기여도 정렬 순위 뱃지 */
    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 10px; font-weight: 800; margin-right: 5px;
      flex-shrink: 0;
    }
    .rank-1 { background: #ff4444; color: #fff; }
    .rank-2 { background: #ff8c00; color: #fff; }
    .rank-3 { background: #f5b800; color: #111; }
    .rank-n { background: var(--bg-surface-2, #e8eaf0); color: var(--text-muted, #8a8fa8); }

    /* 소득/부채 상환 탭 */
    .reverse-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .reverse-tab {
      flex: 1; padding: 9px; border-radius: 10px; font-size: 12.5px; font-weight: 700;
      text-align: center; cursor: default;
      background: var(--bg-surface-2, #f0f2f7); color: var(--text-muted, #8a8fa8);
      border: 1.5px solid transparent;
    }
    .reverse-tab.active-income { background: rgba(255,184,0,.15); color: var(--kb-navy, #12203A); border-color: var(--kb-yellow, #FFB800); }
    .reverse-tab.active-repay  { background: rgba(229,62,62,.1);  color: var(--danger, #e53e3e);   border-color: var(--danger, #e53e3e); }

    /* ── 안정권 카드 ──────────────────────────────────────────────────────── */
    .stable-card { border-color: var(--safe, #38a169) !important; }
    .stable-card::before { background: linear-gradient(90deg, var(--safe, #38a169), #48bb78) !important; }

    /* ── 만료 / 에러 ──────────────────────────────────────────────────────── */
    .rp-error {
      text-align: center; padding: 60px 24px;
    }
    .rp-error-icon { font-size: 56px; margin-bottom: 16px; }
    .rp-error-title { font-size: 20px; font-weight: 800; color: var(--text-primary, #111); margin-bottom: 8px; }
    .rp-error-desc  { font-size: 14px; color: var(--text-secondary, #555); line-height: 1.6; }

    /* ── 푸터 ─────────────────────────────────────────────────────────────── */
    .rp-footer {
      text-align: center; font-size: 11px; color: var(--text-muted, #8a8fa8);
      line-height: 1.7; margin-top: 24px; padding: 0 8px;
    }

    /* ── 다크모드 대응 ───────────────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      .rp-header { background: linear-gradient(135deg, #0d1929, #172540); }
    }
  </style>
</head>
<body>

<div class="rp-wrap" id="rpWrap">
  <!-- JS가 렌더링 -->
  <div class="rp-error">
    <div class="rp-error-icon">⏳</div>
    <p class="rp-error-title">리포트를 불러오는 중...</p>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════════
   report.html — DSR 진단 리포트 렌더러
   ════════════════════════════════════════════════════════════════════════════ */

// ── 유틸 ──────────────────────────────────────────────────────────────────────
const won  = v => Math.round(v).toLocaleString() + '원';
const wonM = v => (Math.floor(Math.max(0,v)/10000)*10000).toLocaleString() + '원';
const pct  = v => v.toFixed(2) + '%';

const CAT_LABELS = {
  mortgage_level:'주택담보 (원리금)', mortgage_prin:'주택담보 (원금)',
  jeonse:'전세대출 (만기)', officetel:'오피스텔 (원리금)',
  credit:'신용대출 (원리금)', cardloan:'카드론 (원리금)',
};
const CAT_EMOJI = {
  mortgage_level:'🏠', mortgage_prin:'🏠', jeonse:'🔑',
  officetel:'🏢', credit:'💳', cardloan:'💰',
};

// DSR 구간 색상
function dsrColor(dsr) {
  if (dsr > 40) return 'var(--danger, #e53e3e)';
  if (dsr > 36) return 'var(--warn, #d97706)';
  if (dsr > 25) return 'var(--kb-yellow-deep, #e5a800)';
  return 'var(--safe, #38a169)';
}

// 순위 뱃지 클래스
function rankClass(i) {
  return ['rank-1','rank-2','rank-3'][i] ?? 'rank-n';
}

// ── 에러 렌더러 ───────────────────────────────────────────────────────────────
function renderError(icon, title, desc) {
  document.getElementById('rpWrap').innerHTML = `
    <div class="rp-error">
      <div class="rp-error-icon">${icon}</div>
      <p class="rp-error-title">${title}</p>
      <p class="rp-error-desc">${desc}</p>
    </div>`;
}

// ── 메인 렌더러 ───────────────────────────────────────────────────────────────
function renderReport(d) {
  const wrap = document.getElementById('rpWrap');

  // 만료 체크
  if (Date.now() > d.expiry) {
    renderError('⏰', '리포트 유효기간 만료',
      '이 리포트는 발급일로부터 7일간 유효합니다.<br>담당자에게 새로운 리포트를 요청해 주세요.');
    return;
  }

  const createdDate = new Date(d.createdAt).toLocaleString('ko-KR', {
    year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'
  });
  const expiryDate = new Date(d.expiry).toLocaleDateString('ko-KR', {
    month:'long', day:'numeric'
  });

  // 부채 목록 — DSR 기여도 내림차순
  const sortedLoans = d.loans
    ? [...d.loans].sort((a, b) => (b.dsrCont ?? 0) - (a.dsrCont ?? 0))
    : [];

  const totalDSR     = d.dsr   ?? parseFloat(d.dsrText) ?? 0;
  const isOver       = d.isOver ?? (totalDSR > 40);
  const color        = dsrColor(totalDSR);
  const barWidth     = Math.min(totalDSR, 100).toFixed(1);

  // ━━━ [1] 헤더 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const headerHtml = `
    <div class="rp-header">
      <div class="rp-logo">KB DSR 진단 리포트</div>
      <div class="rp-title">📊 DSR 종합 진단 결과</div>
      <div class="rp-meta">발급일: ${createdDate}</div>
      <div class="rp-expiry-badge">⏱ ${expiryDate}까지 유효</div>
    </div>`;

  // ━━━ [2] DSR 종합 카드 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const dsrCardHtml = `
    <div class="rp-card">
      <div class="rp-card-title">종합 DSR 지수 (스트레스 금리 반영)</div>
      <div class="dsr-big" style="color:${color};">${d.dsrText || pct(totalDSR)}</div>
      <div class="dsr-label">연소득 대비 연간 원리금 상환 비율</div>
      <div class="dsr-bar-bg">
        <div class="dsr-bar-fill" style="width:${barWidth}%; background:${color};"></div>
      </div>
      <div class="dsr-limit-row">
        <span>0%</span>
        <span style="color:${color}; font-weight:700;">현재 ${pct(totalDSR)}</span>
        <span>규제선 40%</span>
      </div>
    </div>`;

  // ━━━ [3] 요약 그리드 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const summaryHtml = `
    <div class="rp-card">
      <div class="rp-card-title">한도 분석 요약</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-item-label">연간 세전 소득</div>
          <div class="summary-item-value">${won(d.income)}</div>
        </div>
        <div class="summary-item">
          <div class="summary-item-label">연간 총 원리금</div>
          <div class="summary-item-value">${won(d.totalAnnPayment ?? 0)}</div>
        </div>
        <div class="summary-item">
          <div class="summary-item-label">원금균등 최대 한도</div>
          <div class="summary-item-value" style="color:${isOver?'var(--danger)':'var(--safe)'};">${d.maxPTxt || '-'}</div>
        </div>
        <div class="summary-item">
          <div class="summary-item-label">원리금균등 최대 한도</div>
          <div class="summary-item-value">${isOver ? '<span style="color:var(--danger)">한도 초과</span>' : (d.maxLTxt || '-')}</div>
        </div>
        <div class="summary-item" style="grid-column:1/-1;">
          <div class="summary-item-label">현재 추가 가능 대출액</div>
          <div class="summary-item-value" style="color:${isOver?'var(--danger)':'var(--safe)'};">
            ${isOver ? '신규 대출 불가 (규제선 초과)' : (d.remainTxt || '-')}
          </div>
        </div>
      </div>
    </div>`;

  // ━━━ [4] 개별 부채 DSR 기여도 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let contribHtml = '';
  if (sortedLoans.length > 0) {
    const maxCont = Math.max(...sortedLoans.map(l => l.dsrCont ?? 0), 1);

    const rows = sortedLoans.map((l, i) => {
      const contPct  = (l.dsrCont ?? 0);
      const barW     = ((contPct / Math.max(maxCont, totalDSR)) * 100).toFixed(1);
      const fillColor = i === 0
        ? 'var(--danger, #e53e3e)'
        : i === 1 ? 'var(--warn, #d97706)'
        : 'var(--kb-yellow, #FFB800)';
      const label  = CAT_LABELS[l.cat] || l.cat;
      const emoji  = CAT_EMOJI[l.cat]  || '📌';
      const annPmt = l.annPmt ?? 0;

      // 이 부채를 완전히 정리했을 때 DSR 감소폭
      const dsrDrop = contPct.toFixed(2);

      return `
        <div class="loan-contrib-item">
          <div class="loan-contrib-header">
            <div class="loan-contrib-name">
              <span class="rank-badge ${rankClass(i)}">${i+1}</span>
              ${emoji} ${label}
            </div>
            <div class="loan-contrib-pct" style="color:${fillColor};">${pct(contPct)}</div>
          </div>
          <div class="contrib-bar-bg">
            <div class="contrib-bar-fill" style="width:${barW}%; background:${fillColor};"></div>
          </div>
          <div class="loan-contrib-detail">
            <span>원금 ${won(l.P)} | 금리 ${(l.R + (typeof l.SR === 'number' ? l.SR : 0)).toFixed(2)}%</span>
            <span>연 상환 ${won(annPmt)} · DSR -${dsrDrop}%p 감소 가능</span>
          </div>
        </div>`;
    }).join('');

    contribHtml = `
      <div class="rp-card">
        <div class="rp-card-title">📊 개별 부채별 DSR 기여도 (기여도 높은 순)</div>
        ${rows}
      </div>`;
  }

  // ━━━ [5] 역행 산출 / 상환 목표 (DSR 초과 시) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let reverseHtml = '';
  if (isOver && d.reqIncome) {
    const top1 = sortedLoans[0];
    const top1Label = top1 ? `${CAT_EMOJI[top1.cat]||'📌'} ${CAT_LABELS[top1.cat]||top1.cat}` : '-';
    const top1Pct   = top1 ? top1.dsrCont.toFixed(2) : '-';

    reverseHtml = `
      <div class="rp-card reverse-card">
        <div class="rp-card-title">⚠️ 역행 산출 — 규제선 통과 조건 (DSR ${d.targetDSR ?? 35}% 목표)</div>

        <div class="reverse-tabs">
          <div class="reverse-tab active-income">💰 소득 증빙 시나리오</div>
          <div class="reverse-tab active-repay">📉 부채 상환 시나리오</div>
        </div>

        <div class="reverse-solution-grid">
          <div class="reverse-solution-item highlight">
            <div class="rs-label">필요 연소득 (증빙 목표)</div>
            <div class="rs-value accent">${won(d.reqIncome)}</div>
          </div>
          <div class="reverse-solution-item">
            <div class="rs-label">줄여야 할 연간 상환액</div>
            <div class="rs-value" style="color:var(--danger);">${won(d.excessPmt ?? 0)}</div>
          </div>
          <div class="reverse-solution-item" style="grid-column:1/-1;">
            <div class="rs-label">추정 상환 목표 원금 (평균 상환비율 기준)</div>
            <div class="rs-value" style="color:var(--danger); font-size:20px;">${won(d.estReducePrin ?? 0)}</div>
          </div>
        </div>

        <div class="reverse-tip">
          💡 <b>우선 정리 추천:</b> DSR 기여도 <b>1순위</b>인<br>
          &nbsp;&nbsp;&nbsp;<b>${top1Label}</b> (기여도 <b>${top1Pct}%p</b>)를 먼저 상환하면 DSR 감소 효율이 가장 높습니다.<br><br>
          ※ 역행 산출값은 현재 부채 구조 기준 추정치이며, 실제 심사 결과와 다를 수 있습니다.
        </div>
      </div>`;
  } else if (!isOver) {
    // ── 안정권: 원본 데이터로 직접 문구 생성 (recHtml 스냅샷 의존 제거) ───────
    const dVal  = totalDSR.toFixed(1);
    const remainWon = d.remainTxt || '-';
    let stableMsg;
    if (totalDSR >= 36) {
      stableMsg = `<b style="color:#d97706;">⚠️ DSR 경계 구간 — 현재 ${dVal}%</b><br>
        <span style="font-size:12px;line-height:1.8;">규제선까지 여유 <b>${(40 - totalDSR).toFixed(1)}%p</b>. 변동금리 상승 시 초과 위험이 있습니다.<br>추가 대출 여력: <b>${remainWon}</b></span>`;
    } else if (totalDSR >= 25) {
      stableMsg = `<b style="color:#e5a800;">✅ 안정 구간 — 현재 ${dVal}%</b><br>
        <span style="font-size:12px;line-height:1.8;">부채 구조 양호. 추가 대출 여력 <b>${remainWon}</b>.</span>`;
    } else {
      stableMsg = `<b style="color:#38a169;">💚 우량 구간 — 현재 ${dVal}%</b><br>
        <span style="font-size:12px;line-height:1.8;">부채 건전성 매우 양호. 추가 여력 <b>${remainWon}</b>.</span>`;
    }
    reverseHtml = `
      <div class="rp-card stable-card">
        <div class="rp-card-title">✅ 부채 건전성 진단</div>
        <div class="rec-box">${stableMsg}</div>
      </div>`;
  }

  // ━━━ [6] 종합 진단 의견 — 원본 데이터로 직접 생성 (recHtml 스냅샷 제거) ━━━
  // ★ DOM 스냅샷(d.recHtml) 대신 reqIncome·excessPmt 원본값으로 렌더링
  //    → 계산기와 리포트가 항상 동일한 수치를 표시합니다
  let recHtml = '';
  if (isOver && d.reqIncome) {
    const fReq    = d.reqIncome.toLocaleString() + '원';
    const fExcess = (d.excessPmt ?? 0).toLocaleString() + '원';
    const dVal    = totalDSR.toFixed(1);
    const overPp  = (totalDSR - 40).toFixed(1);
    recHtml = `
      <div class="rp-card">
        <div class="rp-card-title">📋 종합 진단 의견</div>
        <div class="rec-box">
          <b style="color:var(--danger);">⛔ DSR 규제선(40%) 초과 — 현재 ${dVal}% (초과 ${overPp}%p)</b><br>
          <span style="font-size:12px;line-height:1.8;">
            신규 대출 실행이 제한됩니다. 안정권(${d.targetDSR ?? 35}%) 진입을 위해<br>
            · <b>연소득</b>이 <span style="color:var(--kb-yellow-deep);">${fReq}</span> 이상 증빙되거나,<br>
            · 연간 원리금을 <span style="color:var(--kb-yellow-deep);">${fExcess}</span> 이상 줄여야 합니다.
          </span>
        </div>
      </div>`;
  }

  // ━━━ [7] 푸터 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const footerHtml = `
    <div class="rp-footer">
      본 리포트는 입력값 기준 예상 수치로, 실제 금융기관 심사 결과와 다를 수 있습니다.<br>
      대출 실행 전 반드시 담당 금융기관에 확인하시기 바랍니다.<br><br>
      <b>DSR 계산기</b> · 리포트 유효기간 ${expiryDate}까지
    </div>`;

  // ━━━ 조합 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  wrap.innerHTML = headerHtml + dsrCardHtml + summaryHtml + contribHtml + reverseHtml + recHtml + footerHtml;
}

// ── 진입점 ─────────────────────────────────────────────────────────────────
(function () {
  // 다크모드 반영
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.classList.toggle('dark', isDark);
  document.body.classList.toggle('white', !isDark);

  const hash = location.hash.slice(1);
  if (!hash) { renderError('⚠️', '리포트 데이터 없음', '올바른 링크로 접속해 주세요.'); return; }

  let data;
  try {
    data = JSON.parse(decodeURIComponent(escape(atob(hash))));
  } catch {
    renderError('🚫', '리포트를 읽을 수 없습니다', '링크가 손상되었거나 형식이 올바르지 않습니다.');
    return;
  }

  renderReport(data);
})();
</script>
</body>
</html>
