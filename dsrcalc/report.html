<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#131926" media="(prefers-color-scheme: dark)">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="../ico/dsrcalc.png">
  <link rel="apple-touch-icon" href="../ico/dsrcalc.png">
  <link rel="stylesheet" href="style.css" media="all">
  <title>DSR 진단 리포트</title>
  <style>
    /* ── 리포트 전용 추가 스타일 ─────────────────────────────────────── */
    .report-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .report-header::before {
      content: ''; display: block; height: 3px;
      background: linear-gradient(90deg, var(--kb-yellow), var(--kb-yellow-deep), #1A2B5A);
      margin: -14px -16px 10px;
    }
    .report-header-inner { display: flex; justify-content: space-between; align-items: center; }
    .report-title { font-size: 16px; font-weight: 800; color: var(--text-primary); letter-spacing: -.03em; }
    .report-readonly-badge {
      font-size: 10px; font-weight: 700; padding: 3px 9px;
      background: var(--bg-surface-3); color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 20px;
    }
    .report-expiry-bar {
      display: flex; align-items: center; gap: 6px; margin-top: 8px;
      font-size: 11px; color: var(--text-muted);
    }
    .report-expiry-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--safe); flex-shrink: 0; }
    .report-expiry-dot.warn { background: var(--warn); }
    .report-expiry-dot.danger { background: var(--danger); }

    .report-disclaimer {
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-left: 4px solid var(--warn);
      border-radius: 10px;
      padding: 12px 14px; margin: 14px 0;
      font-size: 12px; line-height: 1.7; color: var(--text-secondary);
      word-break: keep-all;
    }
    .report-disclaimer strong { color: var(--warn); display: block; margin-bottom: 4px; font-size: 12.5px; }

    .report-loan-summary {
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: 12px; overflow: hidden;
      margin-bottom: 14px; box-shadow: var(--shadow-sm);
    }
    .rls-title {
      background: var(--bg-surface-3);
      padding: 10px 14px;
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      letter-spacing: .06em; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .rls-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .rls-row:last-child { border-bottom: none; }
    .rls-emoji { font-size: 15px; }
    .rls-cat { font-weight: 700; color: var(--text-primary); }
    .rls-sep { color: var(--text-muted); }
    .rls-amount { font-family: 'Barlow', sans-serif; font-weight: 700; color: var(--text-primary); }
    .rls-divider { color: var(--border-strong); }
    .rls-rate { font-family: 'Barlow', sans-serif; color: var(--kb-navy-mid); font-weight: 600; }
    .rls-term { font-size: 12px; color: var(--text-muted); }

    .report-result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .report-result-card {
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: 12px; padding: 14px 12px;
      box-shadow: var(--shadow-xs);
    }
    .rrc-label { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
    .rrc-value { font-family: 'Barlow', sans-serif; font-size: 16px; font-weight: 800; color: var(--text-primary); word-break: break-all; }

    .report-dsr-big {
      text-align: center; margin-bottom: 18px;
      background: var(--bg-surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 20px 16px;
      box-shadow: var(--shadow-md);
    }
    .rdsr-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
    .rdsr-val { font-family: 'Barlow', sans-serif; font-size: 48px; font-weight: 900; letter-spacing: -.04em; line-height: 1.1; }

    /* 탭 공통 */
    .report-tabs { display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 0; }
    .report-tab-btn {
      padding: 13px 0; font-size: 13px; font-weight: 600;
      color: var(--text-muted); border-bottom: 3px solid transparent;
      border: none; background: var(--bg-surface-2); cursor: pointer;
      transition: all .15s;
    }
    .report-tab-btn.active {
      color: var(--kb-navy-mid); border-bottom: 3px solid var(--kb-yellow);
      background: var(--bg-surface); font-weight: 800;
    }

    .error-state {
      text-align: center; padding: 60px 20px;
    }
    .error-state .err-icon { font-size: 48px; margin-bottom: 16px; }
    .error-state h2 { font-size: 18px; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; }
    .error-state p  { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }

    /* 만료 모달 */
    .expiry-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; padding: 20px;
    }
    .expiry-modal-box {
      background: var(--bg-surface); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 28px 22px 20px;
      max-width: 320px; width: 100%; text-align: center;
      box-shadow: 0 16px 50px rgba(0,0,0,.18);
    }
    .expiry-modal-icon { font-size: 36px; margin-bottom: 12px; }
    .expiry-modal-title { font-size: 16px; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; }
    .expiry-modal-body  { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 18px; word-break: keep-all; }
    .expiry-modal-btns  { display: flex; gap: 8px; }
    .expiry-modal-btns button {
      flex: 1; height: 44px; border-radius: 10px; border: none;
      font-size: 13.5px; font-weight: 700; cursor: pointer;
    }
    .btn-expiry-close     { background: var(--bg-surface-3); color: var(--text-secondary); border: 1px solid var(--border) !important; }
    .btn-expiry-today     { background: linear-gradient(135deg, var(--kb-yellow) 0%, var(--kb-yellow-deep) 100%); color: var(--kb-navy); }

    /* 위키 테이블 모바일 */
    @media (max-width: 480px) {
      .report-result-grid { grid-template-columns: 1fr 1fr; }
      .rrc-value { font-size: 13px; }
      .rdsr-val  { font-size: 38px; }
    }
  </style>
</head>
<body>

<!-- 만료 안내 모달 -->
<div id="expiryModal" class="expiry-modal-overlay" style="display:none;">
  <div class="expiry-modal-box">
    <div class="expiry-modal-icon">🔗</div>
    <div class="expiry-modal-title" id="expiryModalTitle">임시 리포트 링크</div>
    <div class="expiry-modal-body" id="expiryModalBody"></div>
    <div class="expiry-modal-btns">
      <button class="btn-expiry-today" onclick="closeExpiryToday()">오늘 하루 보지 않기</button>
      <button class="btn-expiry-close" onclick="closeExpiryModal()">닫기</button>
    </div>
  </div>
</div>

<div class="container">
  <!-- 헤더 -->
  <div class="report-header">
    <div class="report-header-inner">
      <div class="report-title">📊 DSR 진단 리포트</div>
      <span class="report-readonly-badge">🔒 읽기 전용</span>
    </div>
    <div class="report-expiry-bar" id="expiryBar"></div>
  </div>

  <div id="reportContent" style="padding-top:14px;"></div>
</div>

<script>
// ── 테마 적용 ─────────────────────────────────────────────────────────────────
(function() {
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.classList.toggle('dark', isDark);
  document.body.classList.toggle('white', !isDark);
})();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  document.body.classList.toggle('dark', e.matches);
  document.body.classList.toggle('white', !e.matches);
});

// ── 레이블/이모티콘 ─────────────────────────────────────────────────────────
const LABELS = {
  mortgage_level:'주택담보 (원리금)', mortgage_prin:'주택담보 (원금)',
  jeonse:'전세대출 (만기)', officetel:'오피스텔 (원리금)',
  credit:'신용대출 (원리금)', cardloan:'카드론 (원리금)',
};
const EMOJIS = {
  mortgage_level:'🏠', mortgage_prin:'🏠', jeonse:'🔑',
  officetel:'🏢', credit:'💳', cardloan:'💰',
};

// ── 만료 모달 ─────────────────────────────────────────────────────────────────
const EXPIRY_KEY = 'dsr_report_expiry_seen';

function closeExpiryModal() {
  document.getElementById('expiryModal').style.display = 'none';
}
function closeExpiryToday() {
  localStorage.setItem(EXPIRY_KEY, new Date().toISOString().slice(0, 10));
  closeExpiryModal();
}

function showExpiryModal(data) {
  const today = new Date().toISOString().slice(0, 10);
  if (localStorage.getItem(EXPIRY_KEY) === today) return;

  const remaining = data.expiry - Date.now();
  const days   = Math.floor(remaining / 86400000);
  const hours  = Math.floor((remaining % 86400000) / 3600000);
  const expDate = new Date(data.expiry).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });

  document.getElementById('expiryModalTitle').innerText = '🔗 임시 링크 안내';
  document.getElementById('expiryModalBody').innerHTML =
    `이 리포트는 임시 링크로 공유된 내용입니다.<br><br>` +
    `<b>만료일: ${expDate}</b><br>` +
    `<b>남은 시간: ${days}일 ${hours}시간</b><br><br>` +
    `링크 만료 후에는 내용을 확인할 수 없으니 필요한 내용을 미리 저장해두세요.`;
  document.getElementById('expiryModal').style.display = 'flex';
}

// ── 수학 유틸 ─────────────────────────────────────────────────────────────────
function calcPMT(P, r, n) {
  if (r === 0) return P / n;
  return (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
}
function isPurchaseLoan(cat, n) {
  return cat === 'mortgage_level' || cat === 'mortgage_prin' || (cat === 'officetel' && n >= 180);
}

// ── 스케줄 렌더링 ─────────────────────────────────────────────────────────────
let _currentType = 'P';
let _schedData   = null;

function renderScheduleList(loan, type) {
  const { P, R, n, label } = loan;
  const r     = R / 1200;
  const isLvl = type === 'L';
  const mP    = P / n;
  const mPMT  = calcPMT(P, r, n);

  let html = '';
  let bal  = P, yCumP = 0, yCumI = 0, totalI = 0;

  for (let i = 1; i <= n; i++) {
    let curP, curI;
    if (isLvl) { curI = bal * r; curP = mPMT - curI; }
    else       { curI = bal * r; curP = mP; }
    if (i === n) { curP = bal; curI = bal * r; }
    bal -= curP; yCumP += curP; yCumI += curI; totalI += curI;

    html += `<div class="schedule-item">
      <div class="sch-idx">${i}회</div>
      <div class="sch-val">${Math.round(curP).toLocaleString()}</div>
      <div class="sch-val">${Math.round(curI).toLocaleString()}</div>
      <div class="sch-total">${Math.round(curP + curI).toLocaleString()}</div>
    </div>`;

    if (i % 12 === 0 || i === n) {
      const yr = Math.ceil(i / 12);
      html += `<div class="year-summary-card">
        <div class="card-title-row">
          <span class="card-title">📅 ${yr}년차 누적 요약</span>
          <span class="year-badge">${yr}년 경과</span>
        </div>
        <div class="card-stats">
          <div>누적원금: <b class="stat-prin">${Math.round(yCumP).toLocaleString()}원</b></div>
          <div>누적이자: <b class="stat-int">${Math.round(yCumI).toLocaleString()}원</b></div>
        </div>
        <div class="card-balance-row">
          <span class="balance-label">잔액</span>
          <span class="balance-value">${Math.max(0, Math.round(bal)).toLocaleString()}원</span>
        </div>
      </div>`;
      yCumP = 0; yCumI = 0;
    }
  }

  html += `<div class="year-summary-card total-card">
    <div class="card-title-row"><span class="card-title">📊 ${label} 상환 총계</span></div>
    <div class="card-stats">
      <div>총 원금: <b class="stat-prin">${Math.round(P).toLocaleString()}원</b></div>
      <div>총 이자: <b class="stat-int">${Math.round(totalI).toLocaleString()}원</b></div>
    </div>
    <div class="card-balance-row">
      <span class="balance-label">총 납입액</span>
      <span class="balance-value">${Math.round(P + totalI).toLocaleString()}원</span>
    </div>
  </div>`;

  return html;
}

function switchTab(type) {
  _currentType = type;
  document.getElementById('rTabP').classList.toggle('active', type === 'P');
  document.getElementById('rTabL').classList.toggle('active', type === 'L');
  if (_schedData) {
    document.getElementById('rSchedList').innerHTML = renderScheduleList(_schedData, type);
  }
}

// ── 메인 렌더 ─────────────────────────────────────────────────────────────────
window.onload = function() {
  const hash = window.location.hash.slice(1);
  const content = document.getElementById('reportContent');

  if (!hash) {
    content.innerHTML = renderError('유효하지 않은 링크', '링크가 올바르지 않거나 데이터가 없습니다.');
    return;
  }

  let data;
  try {
    data = JSON.parse(decodeURIComponent(escape(atob(hash))));
  } catch {
    content.innerHTML = renderError('데이터 오류', '리포트 데이터를 읽을 수 없습니다. 링크가 손상되었을 수 있습니다.');
    return;
  }

  // 만료 확인
  if (Date.now() > data.expiry) {
    content.innerHTML = renderError('링크가 만료되었습니다 ⏰',
      `이 임시 리포트 링크는 만료되었습니다.<br>새로운 DSR 분석 결과를 공유하려면 계산기에서 다시 복사해주세요.`);
    return;
  }

  // 만료 바
  const remaining = data.expiry - Date.now();
  const days  = Math.floor(remaining / 86400000);
  const hours = Math.floor((remaining % 86400000) / 3600000);
  const expDate = new Date(data.expiry).toLocaleDateString('ko-KR', { month:'long', day:'numeric' });
  const dotClass = days <= 1 ? 'danger' : days <= 3 ? 'warn' : '';
  document.getElementById('expiryBar').innerHTML =
    `<span class="report-expiry-dot ${dotClass}"></span>` +
    `<span>${expDate} 만료 · 남은 시간 ${days}일 ${hours}시간</span>`;

  // 스케줄용 대출 결정
  const allLoans = data.loans || [];
  const pLoans   = allLoans.filter(l => isPurchaseLoan(l.cat, l.n));
  let schedLoan;
  if (pLoans.length >= 2) {
    const totalP    = pLoans.reduce((s, l) => s + l.P, 0);
    const weightedR = pLoans.reduce((s, l) => s + l.R * l.P, 0) / totalP;
    const maxN      = Math.max(...pLoans.map(l => l.n));
    schedLoan = { P: totalP, R: weightedR, n: maxN, label: '통합 구입자금' };
  } else if (pLoans.length === 1) {
    schedLoan = { ...pLoans[0], label: LABELS[pLoans[0].cat] || pLoans[0].cat };
  } else {
    schedLoan = allLoans[0] ? { ...allLoans[0], label: LABELS[allLoans[0].cat] || allLoans[0].cat } : null;
  }
  _schedData = schedLoan;

  // 대출 항목 행
  const loanRows = allLoans.map(l => `
    <div class="rls-row">
      <span class="rls-emoji">${EMOJIS[l.cat] || '📌'}</span>
      <span class="rls-cat">${LABELS[l.cat] || l.cat}</span>
      <span class="rls-sep">—</span>
      <span class="rls-amount">${Math.round(l.P).toLocaleString()}원</span>
      <span class="rls-divider">|</span>
      <span class="rls-rate">${l.R.toFixed(2)}%</span>
      <span class="rls-divider">|</span>
      <span class="rls-term">${l.n}개월</span>
    </div>`).join('');

  content.innerHTML = `
    <!-- 면책 고지 -->
    <div class="report-disclaimer">
      <strong>⚠️ 안내 사항</strong>
      본 결과는 입력값 기준 예상 수치이며, 실제 심사 결과와 상이할 수 있습니다.
      금융 의사결정 전 반드시 담당 금융기관에 확인하시기 바랍니다.
    </div>

    <!-- DSR 수치 -->
    <div class="report-dsr-big">
      <div class="rdsr-label">종합 DSR 지수 (스트레스 반영)</div>
      <div class="rdsr-val" id="rdsr">${data.dsrText || '-'}</div>
    </div>

    <!-- 결과 그리드 -->
    <div class="report-result-grid">
      <div class="report-result-card">
        <div class="rrc-label">최대 한도 (원금균등)</div>
        <div class="rrc-value">${data.maxPTxt || '-'}</div>
      </div>
      <div class="report-result-card">
        <div class="rrc-label">최대 한도 (원리금균등)</div>
        <div class="rrc-value">${data.maxLTxt || '-'}</div>
      </div>
    </div>
    <div class="report-result-card" style="margin-bottom:14px;">
      <div class="rrc-label">추가 가능 대출액</div>
      <div class="rrc-value" style="font-size:22px;">${data.remainTxt || '-'}</div>
    </div>

    <!-- 대출 항목 -->
    <div class="report-loan-summary">
      <div class="rls-title">📋 대출 항목 현황</div>
      ${loanRows}
    </div>

    <!-- 상환 스케줄 -->
    ${schedLoan ? `
    <div class="section-title">📅 회차별 상세 상환 스케줄</div>
    <div class="schedule-wrapper">
      <div class="schedule-tabs report-tabs">
        <button id="rTabP" class="tab-btn report-tab-btn active" onclick="switchTab('P')">원금균등 방식</button>
        <button id="rTabL" class="tab-btn report-tab-btn"        onclick="switchTab('L')">원리금균등 방식</button>
      </div>
      <div class="schedule-header">
        <div>회차</div><div>원금</div><div>이자</div><div>합계</div>
      </div>
      <div id="rSchedList" class="schedule-list"></div>
    </div>` : ''}

    <!-- 하단 면책 -->
    <div class="report-disclaimer" style="margin-top:20px;">
      <strong>📌 본 리포트 안내</strong>
      이 리포트는 DSR 계산기에서 생성된 임시 공유본입니다.
      링크 만료 후에는 열람이 불가하므로 필요한 내용은 미리 저장해두세요.
      <br>생성 버전: ${data.version || '-'}
    </div>`;

  // DSR 색상
  const dsrNum = parseFloat(data.dsrText);
  const dsrEl  = document.getElementById('rdsr');
  if (dsrEl && !isNaN(dsrNum)) {
    dsrEl.style.color = dsrNum > 40 ? "var(--danger)" : dsrNum > 36 ? "var(--warn)" : "var(--safe)";
  }

  // 스케줄 초기 렌더
  if (schedLoan) {
    document.getElementById('rSchedList').innerHTML = renderScheduleList(schedLoan, 'P');
  }

  // 만료 모달 표시
  showExpiryModal(data);
};

function renderError(title, msg) {
  return `<div class="error-state">
    <div class="err-icon">⏰</div>
    <h2>${title}</h2>
    <p>${msg}</p>
  </div>`;
}
</script>
</body>
</html>
