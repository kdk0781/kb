<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DSR 진단 리포트</title>
  <link rel="stylesheet" href="common.css" media="all">
  <style>
    body { background: var(--bg-page); padding: 20px; font-family: 'Pretendard', sans-serif; }
    .report-container { max-width: 500px; margin: 0 auto; background: var(--bg-surface); border-radius: var(--radius-xl); padding: 24px; box-shadow: var(--shadow-lg); }
    .report-header { text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
    .report-title { font-size: 22px; font-weight: 800; color: var(--kb-navy); margin-bottom: 6px; }
    .report-date { font-size: 13px; color: var(--text-muted); }
    
    .data-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-light); }
    .data-label { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
    .data-value { font-size: 16px; font-weight: 800; color: var(--text-primary); text-align: right; }
    .data-value.highlight { color: var(--danger); font-size: 20px; }
    
    .loan-list-title { margin-top: 24px; margin-bottom: 12px; font-size: 15px; font-weight: 800; color: var(--kb-navy); }
    .loan-card { background: var(--bg-page); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; }
    .loan-card-top { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; color: var(--text-primary); }
    .loan-card-bottom { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-secondary); border-top: 1px dashed var(--border); padding-top: 8px; }
    
    .rec-box { margin-top: 24px; padding: 16px; background: var(--bg-surface-2); border-radius: var(--radius-md); font-size: 14px; }
    
    #reportLoading { text-align: center; padding: 50px 0; color: var(--text-muted); }
    #reportError { display: none; text-align: center; padding: 50px 20px; color: var(--danger); font-weight: 700; flex-direction: column; align-items: center; }
  </style>
</head>
<body>

  <div id="reportLoading">
    <h2>데이터를 불러오는 중입니다...</h2>
    <p>잠시만 기다려주세요.</p>
  </div>

  <div id="reportError">
    <div style="font-size: 50px; margin-bottom: 16px;">⚠️</div>
    <div id="errorMsg">리포트를 불러올 수 없습니다.</div>
  </div>

  <div id="reportContent" class="report-container" style="display: none;">
    <div class="report-header">
      <div class="report-title">📊 DSR 진단 리포트</div>
      <div class="report-date" id="r_date">2026.00.00 기준</div>
    </div>

    <div class="data-row">
      <div class="data-label">연간 세전 소득</div>
      <div class="data-value" id="r_income">-</div>
    </div>
    <div class="data-row">
      <div class="data-label">현재 DSR 비율</div>
      <div class="data-value highlight" id="r_dsr">-</div>
    </div>
    <div class="data-row">
      <div class="data-label">추가 대출 여력</div>
      <div class="data-value" id="r_remain">-</div>
    </div>
    <div class="data-row">
      <div class="data-label">원금균등 최대 한도</div>
      <div class="data-value" id="r_maxP" style="font-size: 14px;">-</div>
    </div>
    <div class="data-row">
      <div class="data-label">원리금균등 최대 한도</div>
      <div class="data-value" id="r_maxL" style="font-size: 14px;">-</div>
    </div>

    <div class="rec-box" id="r_rec">
      -
    </div>

    <div class="loan-list-title">📋 반영된 부채 상세 내역</div>
    <div id="r_loanList">
      </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initReport();
    });

    function initReport() {
      // 1. URL 끝에 달린 암호화된 데이터(Hash) 가져오기
      const hash = window.location.hash.substring(1);
      
      if (!hash) {
        showError("잘못된 접근이거나 링크 데이터가 누락되었습니다.");
        return;
      }

      try {
        // 2. ★ 한글 깨짐 방지: Base64 완벽 디코딩 로직
        const decodedStr = decodeURIComponent(escape(atob(hash)));
        const data = JSON.parse(decodedStr);

        // 3. 만료 시간 체크 (7일)
        if (Date.now() > data.expiry) {
          showError("이 진단 리포트 링크는 유효기간(7일)이 만료되었습니다.<br>계산기에서 다시 발급해주세요.");
          return;
        }

        // 4. 화면에 데이터 뿌려주기
        renderReport(data);

      } catch (e) {
        console.error("Decoding Error:", e);
        showError("데이터를 분석하는 중 오류가 발생했습니다.<br>복사된 링크가 중간에 잘렸을 수 있습니다.");
      }
    }

    function renderReport(data) {
      // 작성일자 포맷팅
      const d = new Date(data.createdAt);
      document.getElementById('r_date').innerText = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 기준`;

      // 기본 정보
      document.getElementById('r_income').innerText = Math.round(data.income).toLocaleString() + ' 원';
      document.getElementById('r_dsr').innerText = data.dsrText;
      document.getElementById('r_remain').innerText = data.remainTxt;

      // ★ 줄바꿈 문자(\n)를 HTML 태그(<br>)로 변환해서 깨짐 방지
      document.getElementById('r_maxP').innerHTML = data.maxPTxt.replace(/\n/g, '<br>');
      document.getElementById('r_maxL').innerHTML = data.maxLTxt.replace(/\n/g, '<br>');
      document.getElementById('r_rec').innerHTML = data.recHtml;

      // 부채 목록 렌더링
      const listEl = document.getElementById('r_loanList');
      listEl.innerHTML = '';

      // 카테고리/스트레스 금리 한글 매핑 딕셔너리
      const CAT_LABELS = { mortgage_level: '주택담보(원리금)', mortgage_prin: '주택담보(원금)', jeonse: '전세대출(만기)', officetel: '오피스텔(원리금)', credit: '신용대출(원리금)', cardloan: '카드론(원리금)' };
      const CAT_EMOJIS = { mortgage_level: '🏠', mortgage_prin: '🏠', jeonse: '🔑', officetel: '🏢', credit: '💳', cardloan: '💰' };
      const SR_MAP = { m5_cycle: 1.15, m5_mix: 1.50, v_6_12: 2.87, '0': 0 };

      // 저장된 부채 배열을 순회하며 HTML 카드 생성
      data.loans.forEach((loan) => {
        const emoji = CAT_EMOJIS[loan.cat] || '📌';
        const label = CAT_LABELS[loan.cat] || loan.cat;
        const pStr = Math.round(loan.P).toLocaleString() + '원';
        const rStr = loan.R.toFixed(2) + '%';
        
        // 스트레스 금리 표기 (있는 경우에만)
        const srVal = SR_MAP[loan.SR] !== undefined ? SR_MAP[loan.SR] : 0;
        const srStr = srVal > 0 ? ` <span style="font-size:11px; color:var(--danger);">(+스트레스 ${srVal.toFixed(2)}%)</span>` : '';

        const card = document.createElement('div');
        card.className = 'loan-card';
        card.innerHTML = `
          <div class="loan-card-top">
             <span>${emoji} ${label}</span>
             <span style="font-size:12px; font-weight:600; color:var(--text-muted);">${loan.n}개월</span>
          </div>
          <div class="loan-card-bottom">
             <span>잔액: <b style="color:var(--text-primary);">${pStr}</b></span>
             <span>금리: <b style="color:var(--kb-navy);">${rStr}</b>${srStr}</span>
          </div>
        `;
        listEl.appendChild(card);
      });

      // 데이터 렌더링 완료 후 로딩 숨기고 결과창 보이기
      document.getElementById('reportLoading').style.display = 'none';
      document.getElementById('reportContent').style.display = 'block';
    }

    function showError(msg) {
      document.getElementById('errorMsg').innerHTML = msg;
      document.getElementById('reportError').style.display = 'flex';
      document.getElementById('reportLoading').style.display = 'none';
      document.getElementById('reportContent').style.display = 'none';
    }
  </script>
</body>
</html>
