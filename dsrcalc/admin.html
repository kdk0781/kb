<!DOCTYPE html>
<html lang="ko">
<head>
<!-- admin.html — 관리자 로그인 페이지
  · 관리자 아이디 / 비밀번호 로그인
  · 설정 변경: 비밀번호 / 대표페이지 URL / 상담사 연락처(리포트 워터마크)
  ★ 캐시 갱신: ?v= 값을 올려주세요 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>DSR 계산기 - 관리자 로그인</title>
<link rel="icon" type="image/png" href="../ico/admin_ico.png?v=1.2">
<link rel="apple-touch-icon" href="../ico/admin_ico.png?v=1.2">
<link rel="manifest" href="app_admin.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DSR 관리자">
<link rel="stylesheet" href="./css/common.css" media="all">
<link rel="stylesheet" href="./css/admin.css" media="all">
</head>
<body>
<div class="admin-container">
  <div class="admin-card">
    <div class="admin-header">
      <h2>🔒 관리자 시스템</h2>
      <p>설정된 아이디와 비밀번호를 입력해주세요.</p>
    </div>
    <div class="admin-input-group">
      <label>아이디</label>
      <input type="text" id="adminId" placeholder="아이디 입력" autocomplete="off">
    </div>
    <div class="admin-input-group">
      <label>비밀번호</label>
      <input type="password" id="adminPw" placeholder="비밀번호 입력">
    </div>
    <button class="btn-login" onclick="attemptLogin()">로그인</button>
    <div class="admin-footer">
      <button class="btn-text" onclick="changeAdminSettings()">⚙️ 관리자 설정 변경</button>
    </div>
  </div>
</div>

<!-- 알림 모달 -->
<div id="customModal" class="modal-overlay admin-modal-overlay">
  <div class="modal-content">
    <span id="modalIcon" class="modal-icon">⚠️</span>
    <div id="modalMsg" class="modal-text">알림 문구</div>
    <button class="modal-btn" id="modalConfirm">확인</button>
  </div>
</div>

<!-- 설정 변경 모달 -->
<div id="settingsModal" class="modal-overlay admin-modal-overlay">
  <div class="modal-content settings-modal-content">
    <span class="modal-icon">⚙️</span>
    <div class="modal-text settings-modal-title">관리자 설정 변경</div>
    <div class="settings-section">
      <label class="settings-label">현재 계정 확인</label>
      <input type="text"     id="setCurId" placeholder="현재 아이디"   class="modal-input" autocomplete="off">
      <input type="password" id="setCurPw" placeholder="현재 비밀번호" class="modal-input mt-6">
    </div>
    <div class="settings-section-divider">
      <label class="settings-label">변경할 정보 (미입력시 유지)</label>
      <input type="password" id="setNewPw"    placeholder="새 비밀번호"          class="modal-input">
      <input type="text"     id="setNewUrl"   placeholder="새 대표페이지 URL"    class="modal-input mt-6">
      <!-- 상담사 연락처: 리포트 공유 시 워터마크로 삽입 (미입력 시 워터마크 없음) -->
      <input type="tel"      id="setNewPhone" placeholder="상담사 연락처 (010-0000-0000)"
             class="modal-input mt-6" maxlength="13" autocomplete="off"
             inputmode="numeric" oninput="formatPhoneAdmin(this)">
      <div style="font-size:11px; color:#888; margin-top:4px; padding-left:2px;">
        📋 입력 시 DSR 리포트에 워터마크로 포함됩니다
      </div>
    </div>
    <div class="modal-btn-group">
      <button class="modal-btn modal-btn-cancel" onclick="closeSettingsModal()">취소</button>
      <button class="modal-btn" onclick="saveSettingsFromModal()">저장</button>
    </div>
  </div>
</div>

<!-- admin.js + 전화번호 포맷 함수 -->
<script src="js/admin-login.js"></script>
<script>
/** admin.html 전용 전화번호 자동 하이픈 포맷 */
function formatPhoneAdmin(el) {
  const digits = el.value.replace(/\D/g, '').slice(0, 11);
  if      (digits.length <= 3) el.value = digits;
  else if (digits.length <= 7) el.value = digits.slice(0,3) + '-' + digits.slice(3);
  else                          el.value = digits.slice(0,3) + '-' + digits.slice(3,7) + '-' + digits.slice(7);
}
</script>
</body>
</html>
