<!DOCTYPE HTML>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>시세표</title>
	<link rel="stylesheet" type="text/css" href="./css/common.css" media="all" />
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>📊 아파트 시세 조회</h1>
        <div id="statusMessage" class="status-msg">데이터를 준비 중입니다...</div>
    </div>
    
    <div class="controls">
        <div class="tabs">
            <button class="tab-btn active">전체 시세표</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="지역, 아파트명 검색 (예: 중산동 호반)" autocomplete="off">
        </div>
    </div>

    <div class="table-wrapper">
        <div id="tableContainer"></div>
    </div>

    <div id="pagination" class="pagination"></div>
</div>

<script src="./js/app.js"></script>
</body>
</html>
