<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아파트 시세표</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="../ico/map192.png">
    <link rel="apple-touch-icon" href="../ico/map192.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="css/common.css?v=21">
</head>
<body>

<div id="splashOverlay" class="splash-overlay">
    <div class="spinner"></div>
    <div class="splash-text">데이터를 불러오는 중입니다...</div>
</div>

<div class="container">
    <div class="sticky-header">
        <header class="app-header">
            <h1 class="app-title">📊 아파트 시세표</h1>
            <button id="hardRefreshBtn" class="refresh-btn" title="캐시 삭제 및 최신 데이터 불러오기">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                <span>새로고침</span>
            </button>
        </header>

        <div class="controls">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="지역, 아파트명 검색 (예: 중산동 호반)" autocomplete="off">
            </div>
            <div id="baseDateLabel" class="base-date-label"></div>
        </div>
    </div>

    <div class="list-wrapper" id="listBody"></div>
    <div id="scrollSentinel"></div>
</div>

<script src="js/app.js?v=21"></script>
</body>
</html>
