<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KB 스마트 대출 계산기</title>
    <style>
        :root { 
            --kb-yellow: #FFCC00; 
            --kb-dark: #262626; 
            --bg-light: #F4F6F8;
            --white: #ffffff;
            --gray-text: #666;
            --border-color: #e1e4e8;
        }

        /* 전체 레이아웃 설정 */
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background: var(--bg-light); 
            margin: 0; 
            padding: 10px; /* 모바일 여백 */
            color: #333; 
        }

        .container { 
            max-width: 800px; 
            margin: 20px auto; 
            background: var(--white); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { 
            margin: 0; 
            font-size: 1.5rem; 
            color: var(--kb-dark); 
            border-bottom: 5px solid var(--kb-yellow); 
            display: inline-block; 
            padding-bottom: 5px; 
        }

        /* 반응형 입력 그리드 */
        .input-section { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 기본 2열 */
            gap: 15px; 
            margin-bottom: 25px; 
        }

        /* 모바일에서는 1열로 변경 */
        @media (max-width: 600px) {
            .input-section { grid-template-columns: 1fr; }
            .container { padding: 15px; margin: 10px auto; }
            .header h2 { font-size: 1.25rem; }
        }

        .input-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        @media (max-width: 600px) { .full-width { grid-column: span 1; } }

        label { font-size: 13px; font-weight: 700; color: var(--gray-text); margin-bottom: 6px; }
        input, select { 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            font-size: 16px; 
            background: #fff;
            -webkit-appearance: none; /* iOS 기본 스타일 제거 */
        }
        input:focus { border-color: var(--kb-yellow); outline: none; box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.2); }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--kb-yellow); 
            color: var(--kb-dark); 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
        }
        button:active { transform: scale(0.98); background: #edbc00; }

        /* 결과 요약 카드 */
        .summary-card { 
            background: #FFFBE6; 
            border: 1px solid #FFE58F; 
            padding: 20px; 
            border-radius: 12px; 
            display: none; 
            margin-top: 25px;
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .total-val { font-weight: 800; color: #d32f2f; font-size: 1.1rem; }

        /* 반응형 테이블 */
        .table-wrapper { 
            margin-top: 30px; 
            overflow-x: auto; /* 가로 스크롤 허용 */
            display: none; 
            -webkit-overflow-scrolling: touch;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
        th { background: #f8f9fa; padding: 12px; font-weight: bold; border-bottom: 2px solid #ddd; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; text-align: right; }
        
        /* 1년 주기 색상 */
        .year-even { background-color: #ffffff; }
        .year-odd { background-color: #fafafa; }
        .year-divider { background-color: #f1f1f1; text-align: center !important; font-weight: bold; font-size: 11px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>💰 KB 대출 계산기</h2>
    </div>

    <div class="input-section">
        <div class="input-group full-width">
            <label>대출 원금 (원)</label>
            <input type="text" id="amount" inputmode="numeric" onkeyup="formatComma(this)" placeholder="예: 50,000,000">
        </div>
        <div class="input-group">
            <label>연 이자율 (%)</label>
            <input type="number" id="rate" step="0.1" inputmode="decimal" placeholder="예: 4.5">
        </div>
        <div class="input-group">
            <label>대출 기간 (개월)</label>
            <input type="number" id="months" inputmode="numeric" placeholder="예: 24">
        </div>
        <div class="input-group full-width">
            <label>상환 방식</label>
            <select id="type">
                <option value="level">원리금균등 (매달 같은 금액)</option>
                <option value="principal">원금균등 (매달 같은 원금)</option>
                <option value="bullet">만기일시 (매달 이자만)</option>
            </select>
        </div>
    </div>

    <button onclick="calculateAll()">계산하기</button>

    <div id="summaryCard" class="summary-card">
        <div class="summary-row"><span>대출 원금</span> <span id="sumP">0원</span></div>
        <div class="summary-row"><span>총 이자 합계</span> <span id="sumInt">0원</span></div>
        <div class="summary-row"><span>총 상환금액</span> <span id="sumTotal" class="total-val">0원</span></div>
    </div>

    <div id="tableWrapper" class="table-wrapper">
        <p style="font-size: 13px; color:#d32f2f; text-align: left;">* 모바일에서 가로로 밀어서 상세 내역을 확인하세요.</p>
        <table>
            <thead>
                <tr>
                    <th>회차</th>
                    <th>상환액</th>
                    <th>원금</th>
                    <th>이자</th>
                    <th>잔액</th>
                </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
        </table>
    </div>
</div>

<script>
// 세자리 콤마 포맷팅
function formatComma(obj) {
    let val = obj.value.replace(/[^0-9]/g, "");
    obj.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// 콤마 제거 후 숫자 반환
function getCleanNum(id) {
    return Number(document.getElementById(id).value.replace(/,/g, ""));
}

function calculateAll() {
    const P = getCleanNum('amount');
    const annualRate = Number(document.getElementById('rate').value) / 100;
    const r = annualRate / 12;
    const n = Number(document.getElementById('months').value);
    const type = document.getElementById('type').value;

    if (!P || !annualRate || !n) {
        alert("입력값을 확인해주세요.");
        return;
    }

    let schedule = [];
    let totalInt = 0;
    let balance = P;

    // 계산 로직 (원리금/원금/만기일시)
    if (type === 'level') {
        const monthlyPmt = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        for (let i = 1; i <= n; i++) {
            let interest = Math.round(balance * r);
            let principal = Math.round(monthlyPmt - interest);
            balance -= principal;
            if (i === n) { principal += balance; balance = 0; }
            totalInt += interest;
            schedule.push({ i, pmt: Math.round(monthlyPmt), prn: principal, int: interest, bal: Math.max(0, balance) });
        }
    } else if (type === 'principal') {
        const monthlyPrn = Math.floor(P / n);
        for (let i = 1; i <= n; i++) {
            let interest = Math.round(balance * r);
            let actualPrn = (i === n) ? balance : monthlyPrn;
            let pmt = actualPrn + interest;
            balance -= actualPrn;
            totalInt += interest;
            schedule.push({ i, pmt, prn: actualPrn, int: interest, bal: Math.max(0, balance) });
        }
    } else {
        const monthlyInt = Math.round(P * r);
        for (let i = 1; i <= n; i++) {
            let interest = monthlyInt;
            let principal = (i === n) ? P : 0;
            totalInt += interest;
            schedule.push({ i, pmt: principal + interest, prn: principal, int: interest, bal: (i === n ? 0 : P) });
        }
    }

    render(schedule, P, totalInt);
}

function render(schedule, P, totalInt) {
    document.getElementById('summaryCard').style.display = 'block';
    document.getElementById('sumP').innerText = P.toLocaleString() + "원";
    document.getElementById('sumInt').innerText = Math.round(totalInt).toLocaleString() + "원";
    document.getElementById('sumTotal').innerText = Math.round(P + totalInt).toLocaleString() + "원";

    const body = document.getElementById('scheduleBody');
    body.innerHTML = '';
    
    schedule.forEach((row) => {
        const yearNum = Math.floor((row.i - 1) / 12) + 1;
        const yearClass = (yearNum % 2 === 0) ? 'year-odd' : 'year-even';

        if (row.i > 1 && (row.i - 1) % 12 === 0) {
            body.innerHTML += `<tr><td colspan="5" class="year-divider">--- ${yearNum}년차 시작 ---</td></tr>`;
        }

        body.innerHTML += `
            <tr class="${yearClass}">
                <td style="text-align:center">${row.i}회</td>
                <td style="font-weight:bold">${row.pmt.toLocaleString()}</td>
                <td>${row.prn.toLocaleString()}</td>
                <td>${row.int.toLocaleString()}</td>
                <td>${row.bal.toLocaleString()}</td>
            </tr>`;
    });
    
    document.getElementById('tableWrapper').style.display = 'block';
    // 결과로 자동 스크롤
    document.getElementById('summaryCard').scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
